<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso de Desarrollo Web</title>

    estilos.css

</head>
<body>

    <div id="fechaHora"></div>

    <div class="contenedor">
        <h1>
            Bienvenidos al curso de Desarrollador de Aplicaciones con Tecnologías Web
        </h1>

        <p>
            Este curso es impartido por <strong>Almarir Formación</strong>
        </p>

        <p>
            y se desarrolla en las dependencias de
            <strong>CSIF</strong>, situadas en la
            <strong>C/ Castilla, Jaén</strong>.
        </p>
    </div>

    <script>
        function actualizarFechaHora() {
            const ahora = new Date();

            const opciones = {
                weekday: 'long',
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            };

            const fecha = ahora.toLocaleDateString('es-ES', opciones);
            const hora = ahora.toLocaleTimeString('es-ES');

            document.getElementById("fechaHora").innerHTML =
                "☀️ " +
                fecha.charAt(0).toUpperCase() + fecha.slice(1) +
                " 🌴 " + hora + " 🌊";
        }

        actualizarFechaHora();
        setInterval(actualizarFechaHora, 1000);
    </script>

</body>
</html>
